components:
  schemas:
    AddLoyaltyPoints:
      type: object
      properties:
        points:
          type: integer
          minimum: 0
        reason:
          type: string
          maxLength: 255
      required:
      - points
      - reason
    AllocationStrategyEnum:
      enum:
      - EXCLUSIVE
      - SHARED
      - PRIORITY
      type: string
      description: |-
        * `EXCLUSIVE` - Exclusive
        * `SHARED` - Shared
        * `PRIORITY` - Priority
    Amenity:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 120
        category:
          type: string
          maxLength: 64
        chargeable:
          type: boolean
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        description:
          type: string
        icon_name:
          type: string
          maxLength: 64
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        updated_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        tenant:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
      - category
      - code
      - created_at
      - created_by
      - id
      - name
      - tenant
      - updated_at
      - updated_by
    AmenityInventory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        room_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        amenity_name:
          type: string
          maxLength: 120
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
        tenant:
          type: string
          format: uuid
          readOnly: true
        room:
          type: string
          format: uuid
      required:
      - amenity_name
      - created_at
      - id
      - room
      - room_name
      - tenant
      - updated_at
    AppUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          maxLength: 120
        username:
          type: string
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          nullable: true
          maxLength: 32
        avatar_url:
          type: string
          nullable: true
        preferred_language:
          type: string
          maxLength: 10
        preferred_timezone:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        is_staff:
          type: boolean
          readOnly: true
        role:
          type: string
          format: uuid
          nullable: true
        role_name:
          type: string
          readOnly: true
        department:
          type: string
          format: uuid
          nullable: true
        department_name:
          type: string
          readOnly: true
        shift:
          type: string
          format: uuid
          nullable: true
        shift_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        password:
          type: string
          writeOnly: true
        subscription_plan:
