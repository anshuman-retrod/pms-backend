openapi: 3.0.3
info:
  title: Retrod PMS API
  version: 1.0.0
  description: API documentation for Retrod Property Management System foundation
    layer.
paths:
  /api/audit-logs/:
    get:
      operationId: audit_logs_list
      description: Tenant-isolated, read-only viewset for Audit logs.
      tags:
      - audit-logs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/audit-logs/{id}/:
    get:
      operationId: audit_logs_retrieve
      description: Tenant-isolated, read-only viewset for Audit logs.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this audit log.
        required: true
      tags:
      - audit-logs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticates a user via subdomain, email/username, and password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Logs out the user by blacklisting the provided refresh token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Returns the currently authenticated user details, permissions,
        and properties context.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/request-otp/:
    post:
      operationId: auth_request_otp_create
      description: Generates and dispatches a 6-digit OTP code to a user's phone or
        email.
      tags:
      - auth
      requestBody:
        content:
          application/json:
