components:
  schemas:
    AddLoyaltyPoints:
      type: object
      properties:
        points:
          type: integer
          minimum: 0
        reason:
          type: string
          maxLength: 255
      required:
      - points
      - reason
    Amenity:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 120
        category:
          type: string
          maxLength: 64
        created_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        updated_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        tenant:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
      - category
      - code
      - created_at
      - created_by
      - id
      - name
      - tenant
      - updated_at
      - updated_by
    AppUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          maxLength: 120
        username:
          type: string
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          nullable: true
          maxLength: 32
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 2048
        preferred_language:
          type: string
          maxLength: 10
        preferred_timezone:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        is_staff:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - id
      - is_staff
      - name
      - updated_at
      - username
    AppUserCreate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          maxLength: 120
        username:
          type: string
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          nullable: true
          maxLength: 32
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 2048
        preferred_language:
          type: string
          maxLength: 10
