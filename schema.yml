openapi: 3.0.3
info:
  title: Retrod PMS API
  version: 1.0.0
  description: API documentation for Retrod Property Management System foundation
    layer.
paths:
  /api/admin/security-dashboard/:
    get:
      operationId: admin_security_dashboard_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/system-health/:
    get:
      operationId: admin_system_health_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/admin/system-usage/:
    get:
      operationId: admin_system_usage_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/admin/tenant-dashboard/:
